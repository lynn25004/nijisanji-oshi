name: 每 15 分鐘更新直播資料 (data branch)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: build-streams
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要拿到所有 branch
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 抓 Holodex 直播資料
        env:
          HOLODEX_API_KEY: ${{ secrets.HOLODEX_API_KEY }}
        run: python -u scripts/build_streams.py
      - name: 推 streams.json 到 data branch
        run: |
          set -e
          cp data/streams.json /tmp/streams.json
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          # 切到 data branch（已存在）
          git fetch origin data
          git checkout data
          cp /tmp/streams.json streams.json
          git add streams.json
          git diff --staged --quiet && echo "no change, skip" && exit 0
          git commit -m "更新直播資料 $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin data
