<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>彩虹社推し選擇器</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;--accent1:#ff6b9d;--accent2:#c77dff;--accent3:#48cae4;--text:#e8e8f0;--text2:#9999bb;--card-bg:#1e1e30;--card-border:#2e2e48}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC','Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden}
    .rainbow-bar{height:4px;background:linear-gradient(90deg,#ff6b6b,#ffa94d,#ffd43b,#69db7c,#4dabf7,#9775fa)}
    .header{background:var(--bg2);border-bottom:1px solid var(--card-border);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;backdrop-filter:blur(10px)}
    .header-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .header-title{font-size:18px;font-weight:700}
    .header-sub{font-size:11px;color:var(--text2);margin-top:1px}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .back-btn{background:var(--card-bg);border:1px solid var(--card-border);color:var(--text);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;transition:all .2s}
    .back-btn:hover{background:var(--card-border)}
    .page-pad{padding:18px;max-width:1400px;margin:0 auto}
    .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
    .search-box{background:var(--card-bg);border:1px solid var(--card-border);color:var(--text);padding:8px 14px;border-radius:20px;font-size:14px;width:200px;outline:none;transition:border-color .2s}
    .search-box:focus{border-color:var(--accent2)}
    .search-box::placeholder{color:var(--text2)}
    .filter-btn{background:var(--card-bg);border:1px solid var(--card-border);color:var(--text2);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;transition:all .2s;white-space:nowrap}
    .filter-btn.active{color:#fff;border-color:transparent}
    .filter-btn.active.all{background:linear-gradient(135deg,#ff6b9d,#c77dff)}
    .filter-btn.active.JP{background:linear-gradient(135deg,#ff6b6b,#ff8c42)}
    .filter-btn.active.EN{background:linear-gradient(135deg,#4dabf7,#2196F3)}
    .filter-btn.active.VR{background:linear-gradient(135deg,#69db7c,#43a047)}
    .filter-btn:not(.active):hover{border-color:var(--accent2);color:var(--text)}
    .member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
    @media(max-width:480px){.member-grid{grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:7px}}
    .member-card{background:var(--card-bg);border:2px solid var(--card-border);border-radius:12px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .18s;position:relative;text-align:center;user-select:none}
    .member-card:hover{border-color:var(--accent2);transform:translateY(-2px);background:#222234;box-shadow:0 8px 24px rgba(0,0,0,.3)}
    .member-card.selected{border-color:var(--accent1);background:#26182a;box-shadow:0 0 0 2px rgba(255,107,157,.25)}
    .member-card.inactive{opacity:.45}
    .heart-badge{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;background:var(--accent1);display:flex;align-items:center;justify-content:center;font-size:12px;opacity:0;transform:scale(.7);transition:all .18s}
    .member-card.selected .heart-badge{opacity:1;transform:scale(1)}
    .member-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--card-border);background:var(--bg3);flex-shrink:0}
    .avatar-fallback{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;color:#fff;border:2px solid rgba(255,255,255,.15)}
    .member-name{font-size:11px;font-weight:600;line-height:1.3;max-width:100%;word-break:break-word}
    .member-name-en{font-size:10px;color:var(--text2);max-width:100%;word-break:break-word}
    .branch-tag{position:absolute;top:6px;right:6px;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px}
    .branch-JP{background:rgba(255,107,107,.3);color:#ff6b6b}
    .branch-EN{background:rgba(77,171,247,.3);color:#4dabf7}
    .branch-VR{background:rgba(105,219,124,.3);color:#69db7c}
    .oshi-fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border:none;padding:13px 28px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 32px rgba(199,125,255,.45);transition:all .2s;z-index:300;white-space:nowrap;animation:fabIn .3s ease}
    .oshi-fab:hover{transform:translateX(-50%) scale(1.04)}
    @keyframes fabIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .oshi-page{padding:20px;max-width:900px;margin:0 auto}
    .oshi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
    .oshi-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .2s;position:relative;text-align:center}
    .oshi-card:hover{border-color:var(--accent1);transform:translateY(-3px);box-shadow:0 10px 30px rgba(255,107,157,.2)}
    .oshi-card-name{font-size:13px;font-weight:600;line-height:1.3}
    .oshi-card-en{font-size:11px;color:var(--text2)}
    .oshi-merch-hint{font-size:11px;color:var(--accent3);margin-top:2px}
    .remove-btn{position:absolute;top:7px;right:7px;width:20px;height:20px;border-radius:50%;background:rgba(255,107,107,.2);border:none;color:#ff9999;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
    .remove-btn:hover{background:rgba(255,107,107,.5)}
    .member-hero{background:var(--bg2);border-bottom:1px solid var(--card-border);padding:20px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .hero-info{flex:1;min-width:0}
    .hero-name{font-size:20px;font-weight:700}
    .hero-name-en{font-size:13px;color:var(--text2);margin-top:2px}
    .hero-tags{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap}
    .hero-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--card-bg);border:1px solid var(--card-border)}
    .section-hdr{font-size:17px;font-weight:700;padding:16px 18px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .count-badge{font-size:12px;color:var(--text2);background:var(--card-bg);padding:3px 10px;border-radius:20px;border:1px solid var(--card-border)}
    .refresh-btn{font-size:12px;color:var(--text2);background:var(--card-bg);border:1px solid var(--card-border);padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .2s;margin-left:auto}
    .refresh-btn:hover{border-color:var(--accent2);color:var(--text)}
    .merch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:0 18px 80px}
    @media(max-width:480px){.merch-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px;padding:0 12px 60px}}
    .merch-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;overflow:hidden;text-decoration:none;color:var(--text);display:block;transition:all .2s}
    .merch-card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
    .merch-img{aspect-ratio:1;background:#111118;overflow:hidden}
    .merch-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
    .merch-card:hover .merch-img img{transform:scale(1.05)}
    .merch-info{padding:9px 11px 12px}
    .merch-title{font-size:11px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .merch-price{font-size:13px;font-weight:700;margin-top:5px;color:var(--accent1)}
    .merch-avail{font-size:10px;margin-top:3px;display:flex;align-items:center;gap:4px}
    .avail-dot{width:6px;height:6px;border-radius:50%}
    .avail-dot.in{background:#69db7c}
    .avail-dot.out{background:#ff6b6b}
    .merch-error{margin:0 18px 16px;padding:12px 16px;background:rgba(255,100,100,.1);border:1px solid rgba(255,100,100,.3);border-radius:10px;font-size:13px;color:#ff9999;line-height:1.6}
    .merch-notice{margin:0 18px 16px;padding:12px 16px;background:rgba(77,171,247,.08);border:1px solid rgba(77,171,247,.2);border-radius:10px;font-size:12px;color:var(--text2);line-height:1.6}
    .merch-loading{text-align:center;padding:50px 20px;color:var(--text2)}
    .no-merch{text-align:center;padding:40px 20px;color:var(--text2)}
    .no-merch .icon{font-size:44px;margin-bottom:10px}
    .spinner{width:32px;height:32px;border:3px solid var(--card-border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:3px}
    .result-info{font-size:12px;color:var(--text2);margin-bottom:10px}
    .page-title{font-size:22px;font-weight:700;margin-bottom:4px}
    .page-sub{color:var(--text2);font-size:13px;margin-bottom:16px}
    .toggle-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer}
    .toggle-sw{width:30px;height:17px;background:var(--card-border);border-radius:9px;position:relative;transition:background .2s;flex-shrink:0}
    .toggle-sw.on{background:var(--accent2)}
    .toggle-sw::after{content:'';position:absolute;top:3px;left:3px;width:11px;height:11px;background:#fff;border-radius:50%;transition:left .2s}
    .toggle-sw.on::after{left:16px}
    .store-links{display:flex;gap:8px;flex-wrap:wrap;padding:0 18px 16px}
    .store-link-btn{display:inline-flex;align-items:center;gap:6px;background:var(--card-bg);border:1px solid var(--card-border);color:var(--text);padding:8px 16px;border-radius:20px;font-size:12px;text-decoration:none;transition:all .2s}
    .store-link-btn:hover{border-color:var(--accent2)}
    .fetch-status{font-size:10px;color:var(--text2);padding:0 18px 8px}
    .auth-btn{background:linear-gradient(135deg,var(--accent1),var(--accent2));border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;transition:transform .15s}
    .auth-btn:hover{transform:translateY(-1px)}
    .auth-pill{display:flex;align-items:center;gap:8px;background:var(--card-bg);border:1px solid var(--card-border);padding:4px 4px 4px 10px;border-radius:20px;font-size:11px;color:var(--text2)}
    .auth-pill .auth-email{color:var(--text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .auth-pill .auth-logout{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:11px;padding:2px 8px;border-radius:12px}
    .auth-pill .auth-logout:hover{background:var(--card-border);color:var(--accent1)}
    .notify-row{display:flex;align-items:center;gap:8px;background:var(--card-bg);border:1px solid var(--card-border);padding:10px 14px;border-radius:12px;margin:0 0 14px;font-size:13px}
    .notify-row .nt-label{flex:1;color:var(--text)}
    .notify-row .nt-sub{font-size:11px;color:var(--text2);margin-top:2px}
    .modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);padding:20px}
    .modal{background:var(--bg2);border:1px solid var(--card-border);border-radius:16px;padding:24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .modal h2{font-size:18px;margin-bottom:6px}
    .modal p{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5}
    .modal input{width:100%;background:var(--bg);border:1px solid var(--card-border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:14px;outline:none;margin-bottom:12px;font-family:inherit}
    .modal input:focus{border-color:var(--accent2)}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end}
    .modal-actions button{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:inherit}
    .modal-cancel{background:var(--card-bg);color:var(--text2)}
    .modal-submit{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;font-weight:600}
    .modal-submit:disabled{opacity:.5;cursor:not-allowed}
    .modal-msg{font-size:12px;padding:8px 12px;border-radius:8px;margin-top:10px;line-height:1.5}
    .modal-msg.ok{background:rgba(105,219,124,.15);color:#69db7c}
    .modal-msg.err{background:rgba(255,107,107,.15);color:#ff6b6b}
  </style>
</head>
<body>
<div class="rainbow-bar"></div>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef}=React;

const SUPABASE_URL='https://fntotxazjfkzwejotxac.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_2mMxRnHZLrIJCOfWlniPfA_XHDh0LGi';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth:{persistSession:true, autoRefreshToken:true, detectSessionInUrl:true}
});

const STORE='https://shop.nijisanji.jp';
// 商品資料由 GitHub Actions 預先抓 shop.nijisanji.jp 全部商品 → data/products.json
// 前端只 fetch 這個靜態檔，沒有 CORS / proxy 問題，比對也精準（用真實 ライバー 名單）
let _productsCache=null;

async function loadProducts(){
  if(_productsCache) return _productsCache;
  const r=await fetch('./data/products.json');
  if(!r.ok) throw new Error(`products.json 載入失敗 (${r.status})`);
  const d=await r.json();
  _productsCache={products:d.products||[],lastUpdated:d.lastUpdated||''};
  return _productsCache;
}

function bl(b){return{JP:'🇯🇵 JP',EN:'🌍 EN',VR:'🌐 VR'}[b]||b}
function fd(d){if(!d)return'';const[y,m,day]=d.split('-');return`${y}年${+m}月${+day}日`}
function ini(n){if(!n)return'?';return/^[A-Za-z]/.test(n)?n.slice(0,2).toUpperCase():n.slice(0,1)}
function hc(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xFFFFFF;return'#'+('000000'+h.toString(16)).slice(-6)}
function lt(hex,a=.3){const n=parseInt(hex.slice(1),16);const r=Math.min(255,(n>>16)+Math.round(255*a));const g=Math.min(255,((n>>8)&0xFF)+Math.round(255*a));const b=Math.min(255,(n&0xFF)+Math.round(255*a));return`rgb(${r},${g},${b})`}

function Avatar({member,size=64}){
  const[fail,setFail]=useState(false);
  const c=member.color||hc(member.id||'x');
  if(!member.image||fail)
    return <div className="avatar-fallback" style={{width:size,height:size,background:`linear-gradient(135deg,${c},${lt(c)})`,fontSize:size*.28}}>{ini(member.name||member.nameEn)}</div>;
  return <img className="member-avatar" src={member.image} alt={member.nameEn||member.name} width={size} height={size} onError={()=>setFail(true)} style={{width:size,height:size}}/>;
}

function MerchCard({p}){
  return(
    <a className="merch-card" href={p.url} target="_blank" rel="noreferrer">
      <div className="merch-img">
        {p.image?<img src={p.image} alt={p.title} loading="lazy"/>
          :<div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#444',fontSize:36}}>🛍</div>}
      </div>
      <div className="merch-info">
        <div className="merch-title">{p.title}</div>
        {p.price&&<div className="merch-price">¥{p.price.toLocaleString()}</div>}
        {p.talents&&p.talents.length>1&&(
          <div style={{fontSize:10,color:'var(--text2)',marginTop:3}}>含 {p.talents.length} 位ライバー</div>
        )}
      </div>
    </a>
  );
}

function MerchPage({member}){
  const[data,setData]=useState(null);
  const[err,setErr]=useState('');

  useEffect(()=>{
    setErr('');
    loadProducts().then(setData).catch(e=>setErr(e.message));
  },[]);

  const matched=useMemo(()=>{
    if(!data||!member.name) return[];
    // 用 talents 陣列精準比對 + 過濾已下架 + 依 lastmod 由新到舊
    const ms=data.products.filter(p=>
      (p.talents||[]).includes(member.name) && p.available!==false
    );
    // 排序：優先用官方「掲載開始日(新しい順)」rank，沒有則退回 firstSeenAt 新→舊
    const BIG=1e9;
    return ms.sort((a,b)=>{
      const ra=Number.isFinite(a.officialOrder)?a.officialOrder:BIG;
      const rb=Number.isFinite(b.officialOrder)?b.officialOrder:BIG;
      if(ra!==rb) return ra-rb;
      return (b.firstSeenAt||b.lastmod||'').localeCompare(a.firstSeenAt||a.lastmod||'');
    });
  },[data,member]);

  const c=member.color||hc(member.id||'x');
  const searchQ=encodeURIComponent(member.name||member.nameEn||'');

  return(
    <div>
      <div className="member-hero">
        <div style={{width:80,height:80,borderRadius:'50%',padding:2,background:`linear-gradient(135deg,${c},${lt(c)})`,flexShrink:0}}>
          <div style={{width:76,height:76,borderRadius:'50%',overflow:'hidden'}}><Avatar member={member} size={76}/></div>
        </div>
        <div className="hero-info">
          <div className="hero-name">{member.name}</div>
          {member.nameEn&&member.nameEn!==member.name&&<div className="hero-name-en">{member.nameEn}</div>}
          <div className="hero-tags">
            <span className="hero-tag">{bl(member.branch)}</span>
            {member.debutDate&&<span className="hero-tag">📅 {fd(member.debutDate)}</span>}
            {member.active===false&&<span className="hero-tag" style={{color:'#ff9999'}}>已畢業</span>}
          </div>
        </div>
      </div>

      <div className="store-links">
        <a className="store-link-btn" href={`${STORE}/search?q=${searchQ}`} target="_blank" rel="noreferrer">🛒 shop.nijisanji.jp 搜尋</a>
        {member.channelUrl&&<a className="store-link-btn" href={member.channelUrl} target="_blank" rel="noreferrer">▶ YouTube</a>}
      </div>

      {err&&(
        <div className="merch-error">
          ⚠️ 無法載入商品索引：{err}<br/>
          <span style={{fontSize:11}}>請重新整理頁面，或直接
            <a href={`${STORE}/search?q=${searchQ}`} target="_blank" rel="noreferrer" style={{color:'#ffb3b3',marginLeft:4}}>前往 shop.nijisanji.jp 搜尋</a>
          </span>
        </div>
      )}

      <div className="section-hdr">
        🛍️ 相關商品
        {data&&<span className="count-badge">{matched.length} 件</span>}
        {data&&<span style={{fontSize:11,color:'var(--text2)',marginLeft:'auto'}}>索引更新：{data.lastUpdated}</span>}
      </div>

      {!data&&!err&&(
        <div className="merch-loading">
          <div className="spinner"></div>
          <div>載入商品索引中…</div>
        </div>
      )}

      {data&&matched.length===0&&!err&&(
        <div className="no-merch">
          <div className="icon">🔍</div>
          <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>
            shop.nijisanji.jp 目前沒有此成員的商品
          </div>
          <div style={{fontSize:12}}>
            可<a href={`${STORE}/search?q=${searchQ}`} target="_blank" rel="noreferrer" style={{color:'var(--accent3)',margin:'0 4px'}}>到商店直接搜尋</a>看看
          </div>
        </div>
      )}

      {data&&matched.length>0&&(
        <div className="merch-grid">{matched.map(p=><MerchCard key={p.code} p={p}/>)}</div>
      )}
    </div>
  );
}

function OshiPage({members,oshiIds,onRemove,onViewMerch,onBack,isShared,onApplyShared,notifyOn,onToggleNotify,loggedIn,onLoginClick}){
  const list=members.filter(m=>oshiIds.has(m.id));
  const[copyMsg,setCopyMsg]=useState('');
  const share=async()=>{
    const ids=[...oshiIds].join(',');
    const url=`${location.origin}${location.pathname}?oshi=${encodeURIComponent(ids)}`;
    try{await navigator.clipboard.writeText(url);setCopyMsg('已複製連結！');}
    catch{setCopyMsg(url);}
    setTimeout(()=>setCopyMsg(''),3000);
  };
  return(
    <div className="oshi-page">
      <div className="page-title">💜 {isShared?'朋友的推し':'我的推し'}</div>
      <div className="page-sub">共 {list.length} 位 · 點擊成員查看周邊商品</div>
      {isShared&&(
        <div style={{textAlign:'center',margin:'8px 0 14px'}}>
          <button onClick={onApplyShared} style={{background:'var(--accent)',border:'none',color:'#fff',padding:'8px 18px',borderRadius:20,cursor:'pointer',fontSize:13,marginRight:8}}>
            套用為自己的清單
          </button>
          <span style={{fontSize:11,color:'var(--text2)'}}>（不套用：只是瀏覽，不會存到你瀏覽器）</span>
        </div>
      )}
      {!isShared&&list.length>0&&(
        <div style={{textAlign:'center',margin:'8px 0 14px'}}>
          <button onClick={share} style={{background:'var(--card-bg)',border:'1px solid var(--card-border)',color:'var(--text)',padding:'8px 18px',borderRadius:20,cursor:'pointer',fontSize:13}}>
            🔗 分享我的清單
          </button>
          {copyMsg&&<div style={{marginTop:6,fontSize:11,color:'var(--text2)'}}>{copyMsg}</div>}
        </div>
      )}
      {!isShared&&list.length>0&&(
        loggedIn
          ? <NotifyToggle enabled={notifyOn} onChange={onToggleNotify}/>
          : <div className="notify-row" onClick={onLoginClick} style={{cursor:'pointer'}}>
              <div>
                <div className="nt-label">🔔 想要新品通知？</div>
                <div className="nt-sub">登入後可訂閱 email，每小時檢查一次</div>
              </div>
              <button className="auth-btn">登入</button>
            </div>
      )}
      <div className="oshi-grid">
        {list.map(m=>{
          const c=m.color||hc(m.id||'x');
          return(
            <div key={m.id} className="oshi-card" onClick={()=>onViewMerch(m)}>
              <button className="remove-btn" onClick={e=>{e.stopPropagation();onRemove(m.id);}}>×</button>
              <div style={{width:76,height:76,borderRadius:'50%',padding:2,background:`linear-gradient(135deg,${c},${lt(c)})`}}>
                <div style={{width:72,height:72,borderRadius:'50%',overflow:'hidden'}}><Avatar member={m} size={72}/></div>
              </div>
              <div className="oshi-card-name">{m.name}</div>
              {m.nameEn&&m.nameEn!==m.name&&<div className="oshi-card-en">{m.nameEn}</div>}
              <div className={`hero-tag branch-${m.branch}`} style={{fontSize:10,padding:'2px 8px',borderRadius:10,marginTop:2}}>{bl(m.branch)}</div>
              <div className="oshi-merch-hint">👉 查看周邊</div>
            </div>
          );
        })}
      </div>
      <div style={{textAlign:'center',marginTop:28}}>
        <button onClick={onBack} style={{background:'var(--card-bg)',border:'1px solid var(--card-border)',color:'var(--text)',padding:'10px 24px',borderRadius:20,cursor:'pointer',fontSize:13}}>
          ＋ 繼續選擇成員
        </button>
      </div>
    </div>
  );
}

function MemberSelect({members,lastUpdated,oshiIds,onToggle,onViewOshi}){
  const[search,setSearch]=useState('');
  const[branch,setBranch]=useState('all');
  const[showInactive,setShowInactive]=useState(false);
  const branches=useMemo(()=>[...new Set(members.map(m=>m.branch))].sort(),[members]);
  const filtered=useMemo(()=>{
    let l=members;
    if(!showInactive) l=l.filter(m=>m.active!==false);
    if(branch!=='all') l=l.filter(m=>m.branch===branch);
    if(search.trim()){const q=search.trim().toLowerCase();l=l.filter(m=>m.name?.toLowerCase().includes(q)||m.nameEn?.toLowerCase().includes(q));}
    return l;
  },[members,branch,search,showInactive]);
  const cnt=oshiIds.size;
  return(
    <div className="page-pad">
      <div style={{marginBottom:14,marginTop:2}}>
        <div className="page-title">選擇你的推し 💜</div>
        <div className="page-sub">
          按出道日期排列 · {members.filter(m=>m.active!==false).length} 位活躍成員
          {lastUpdated&&<span style={{marginLeft:6}}>· 更新：{lastUpdated}</span>}
        </div>
      </div>
      <div className="filters">
        <input className="search-box" placeholder="🔍 搜尋名稱…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <button className={`filter-btn ${branch==='all'?'active all':''}`} onClick={()=>setBranch('all')}>全部</button>
        {branches.map(b=><button key={b} className={`filter-btn ${branch===b?`active ${b}`:''}`} onClick={()=>setBranch(b)}>{bl(b)}</button>)}
        <label className="toggle-label" style={{marginLeft:'auto'}} onClick={()=>setShowInactive(s=>!s)}>
          <span className={`toggle-sw ${showInactive?'on':''}`}></span>顯示畢業
        </label>
      </div>
      <div className="result-info">找到 {filtered.length} 位{cnt>0&&<span style={{color:'var(--accent1)'}}> · 已選 {cnt} 位</span>}</div>
      <div className="member-grid">
        {filtered.length===0?(
          <div style={{textAlign:'center',padding:'50px 20px',color:'var(--text2)',gridColumn:'1/-1'}}>
            <div style={{fontSize:40,marginBottom:10}}>🌈</div>找不到符合的成員
          </div>
        ):filtered.map(m=>(
          <div key={m.id} className={`member-card ${oshiIds.has(m.id)?'selected':''} ${m.active===false?'inactive':''}`} onClick={()=>onToggle(m.id)}>
            <div className="heart-badge">♥</div>
            <span className={`branch-tag branch-${m.branch}`}>{m.branch}</span>
            <Avatar member={m} size={64}/>
            <div className="member-name">{m.name}</div>
            {m.nameEn&&m.nameEn!==m.name&&<div className="member-name-en">{m.nameEn}</div>}
            {m.debutDate&&<div style={{fontSize:9,color:'var(--text2)'}}>{m.debutDate.slice(0,7)}</div>}
          </div>
        ))}
      </div>
      {cnt>0&&<button className="oshi-fab" onClick={onViewOshi}>💜 查看我的推し ({cnt}人)</button>}
    </div>
  );
}

function LoginModal({onClose}){
  const[email,setEmail]=useState('');
  const[sending,setSending]=useState(false);
  const[msg,setMsg]=useState(null);
  const submit=async()=>{
    if(!email.trim()) return;
    setSending(true);setMsg(null);
    const{error}=await sb.auth.signInWithOtp({
      email:email.trim(),
      options:{emailRedirectTo:location.origin+location.pathname}
    });
    setSending(false);
    if(error) setMsg({type:'err',text:'寄送失敗：'+error.message});
    else setMsg({type:'ok',text:'已寄出登入連結！請去 '+email+' 收信，點開連結即可登入（5 分鐘內有效）'});
  };
  return(
    <div className="modal-bd" onClick={e=>{if(e.target===e.currentTarget) onClose();}}>
      <div className="modal">
        <h2>登入 / 註冊</h2>
        <p>輸入 email，我會寄一封登入連結給你。第一次使用會自動註冊，跨裝置同步推し清單與訂閱新品通知。</p>
        <input type="email" placeholder="your@email.com" value={email}
          onChange={e=>setEmail(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter') submit();}} autoFocus/>
        <div className="modal-actions">
          <button className="modal-cancel" onClick={onClose}>取消</button>
          <button className="modal-submit" onClick={submit} disabled={sending||!email.trim()}>
            {sending?'寄送中…':'寄登入連結'}
          </button>
        </div>
        {msg&&<div className={`modal-msg ${msg.type}`}>{msg.text}</div>}
      </div>
    </div>
  );
}

function AuthBar({session,onLogin,onLogout}){
  if(!session) return <button className="auth-btn" onClick={onLogin}>登入 / 註冊</button>;
  return(
    <div className="auth-pill" title={session.user.email}>
      <span>👤</span>
      <span className="auth-email">{session.user.email}</span>
      <button className="auth-logout" onClick={onLogout}>登出</button>
    </div>
  );
}

function NotifyToggle({enabled,onChange,disabled}){
  return(
    <div className="notify-row">
      <div>
        <div className="nt-label">🔔 新品上架時 email 通知我</div>
        <div className="nt-sub">{disabled?'登入後即可開啟':'每小時檢查一次，shop.nijisanji.jp 有你推的成員新商品時會寄信給你'}</div>
      </div>
      <label className="toggle-label" onClick={()=>!disabled&&onChange(!enabled)} style={{opacity:disabled?.4:1,cursor:disabled?'not-allowed':'pointer'}}>
        <span className={`toggle-sw ${enabled?'on':''}`}></span>
      </label>
    </div>
  );
}

function App(){
  const[members,setMembers]=useState([]);
  const[lastUpdated,setLastUpdated]=useState('');
  const[loading,setLoading]=useState(true);
  const[curMember,setCurMember]=useState(null);
  const[session,setSession]=useState(null);
  const[showLogin,setShowLogin]=useState(false);
  const[notifyOn,setNotifyOn]=useState(false);
  const syncedRef=useRef(false);
  // 解析分享連結 ?oshi=id1,id2,id3
  const sharedIds=(()=>{
    try{
      const v=new URLSearchParams(location.search).get('oshi');
      return v?v.split(',').map(s=>s.trim()).filter(Boolean):null;
    }catch{return null;}
  })();
  const[isShared,setIsShared]=useState(()=>!!sharedIds);
  const[oshiIds,setOshiIds]=useState(()=>{
    if(sharedIds) return new Set(sharedIds);
    try{return new Set(JSON.parse(localStorage.getItem('niji_oshi')||'[]'));}
    catch{return new Set();}
  });
  // 已選過推し（自己 or 從分享連結）→ 直接落地我的推し；沒有 → 從成員清單開始
  const[view,setView]=useState(()=>oshiIds.size>0?'oshi':'select');
  const applySharedToSelf=useCallback(()=>{
    setIsShared(false);
    history.replaceState(null,'',location.pathname);
  },[]);
  useEffect(()=>{
    if(isShared) return;  // 分享模式下不污染自己的 localStorage
    try{localStorage.setItem('niji_oshi',JSON.stringify([...oshiIds]));}catch{}
  },[oshiIds,isShared]);
  useEffect(()=>{
    fetch('./data/members.json').then(r=>r.json()).then(d=>{
      const s=[...(d.members||[])].sort((a,b)=>(!a.debutDate?1:!b.debutDate?-1:a.debutDate.localeCompare(b.debutDate)));
      setMembers(s);setLastUpdated(d.lastUpdated||'');
    }).catch(()=>setMembers([])).finally(()=>setLoading(false));
  },[]);

  // ─── Supabase auth + sync ───
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const{data:sub}=sb.auth.onAuthStateChange((_e,s)=>{
      setSession(s);
      if(!s){syncedRef.current=false;setNotifyOn(false);}
    });
    return()=>sub.subscription.unsubscribe();
  },[]);

  // 登入後：拉 Supabase 訂閱清單 → merge 進本機（第一次同步：以本機 + 雲端聯集為準）
  useEffect(()=>{
    if(!session||isShared||syncedRef.current) return;
    syncedRef.current=true;
    (async()=>{
      const[{data:subs},{data:settings}]=await Promise.all([
        sb.from('oshi_subscriptions').select('member_id').eq('user_id',session.user.id),
        sb.from('oshi_notify_settings').select('email_enabled').eq('user_id',session.user.id).maybeSingle()
      ]);
      const remote=new Set((subs||[]).map(r=>r.member_id));
      const local=new Set(oshiIds);
      // 第一次登入：合併兩邊。之後本機就跟雲端一致了
      const merged=new Set([...local,...remote]);
      setOshiIds(merged);
      // 把本機有但雲端沒有的塞回雲端
      const toInsert=[...local].filter(id=>!remote.has(id));
      if(toInsert.length){
        await sb.from('oshi_subscriptions').insert(toInsert.map(member_id=>({user_id:session.user.id,member_id})));
      }
      setNotifyOn(!!settings?.email_enabled);
    })();
  },[session,isShared]);

  const toggleOshi=useCallback(id=>{
    setOshiIds(prev=>{
      const n=new Set(prev);
      const had=n.has(id);
      had?n.delete(id):n.add(id);
      // 同步到 Supabase（登入時）
      if(session&&!isShared){
        if(had) sb.from('oshi_subscriptions').delete().eq('user_id',session.user.id).eq('member_id',id).then(()=>{});
        else sb.from('oshi_subscriptions').insert({user_id:session.user.id,member_id:id}).then(()=>{});
      }
      return n;
    });
  },[session,isShared]);
  const removeOshi=useCallback(id=>{
    setOshiIds(prev=>{const n=new Set(prev);n.delete(id);return n;});
    if(session&&!isShared){
      sb.from('oshi_subscriptions').delete().eq('user_id',session.user.id).eq('member_id',id).then(()=>{});
    }
  },[session,isShared]);

  const toggleNotify=useCallback(async(v)=>{
    setNotifyOn(v);
    if(!session) return;
    await sb.from('oshi_notify_settings').upsert({
      user_id:session.user.id,
      email_enabled:v,
      updated_at:new Date().toISOString()
    });
  },[session]);

  const logout=useCallback(async()=>{
    await sb.auth.signOut();
    // 登出後保留本機 oshiIds，但清除通知設定
    setNotifyOn(false);
  },[]);
  const titles={select:'彩虹社推し選擇器',oshi:'我的推し',merch:curMember?.name||'商品'};
  if(loading)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'80vh'}}><div className="spinner"></div></div>;
  return(
    <div>
      <div className="header">
        <div className="header-logo">🌈</div>
        <div><div className="header-title">{titles[view]}</div><div className="header-sub">NIJISANJI Oshi Picker</div></div>
        <div className="header-right">
          {view==='merch'&&<button className="back-btn" onClick={()=>setView('oshi')}>← 返回</button>}
          {view==='oshi'&&<button className="back-btn" onClick={()=>setView('select')}>← 選擇成員</button>}
          <AuthBar session={session} onLogin={()=>setShowLogin(true)} onLogout={logout}/>
        </div>
      </div>
      {view==='select'&&<MemberSelect members={members} lastUpdated={lastUpdated} oshiIds={oshiIds} onToggle={toggleOshi} onViewOshi={()=>setView('oshi')}/>}
      {view==='oshi'&&<OshiPage members={members} oshiIds={oshiIds} onRemove={removeOshi} onViewMerch={m=>{setCurMember(m);setView('merch');}} onBack={()=>setView('select')} isShared={isShared} onApplyShared={applySharedToSelf} notifyOn={notifyOn} onToggleNotify={toggleNotify} loggedIn={!!session} onLoginClick={()=>setShowLogin(true)}/>}
      {view==='merch'&&curMember&&<MerchPage member={curMember}/>}
      {showLogin&&<LoginModal onClose={()=>setShowLogin(false)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
