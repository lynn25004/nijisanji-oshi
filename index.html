<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>彩虹社推し選擇器</title>
  <meta name="description" content="選你推的彩虹社成員，看官方周邊，收新品 + 直播提醒" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#ff6b9d" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="推しPicker" />
  <!-- 社群分享預覽 (LINE / Discord / Twitter / Slack) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="🌈 彩虹社推し選擇器" />
  <meta property="og:description" content="選你推的彩虹社成員，看官方周邊，收新品 + 直播提醒（email + 瀏覽器推播）" />
  <meta property="og:image" content="https://lynn25004.github.io/nijisanji-oshi/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://lynn25004.github.io/nijisanji-oshi/" />
  <meta property="og:site_name" content="NIJISANJI Oshi Picker" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="🌈 彩虹社推し選擇器" />
  <meta name="twitter:description" content="選你推的彩虹社成員，收新品 + 直播提醒" />
  <meta name="twitter:image" content="https://lynn25004.github.io/nijisanji-oshi/og.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <script>
    // 主題預設：localStorage > 系統偏好 > dark
    (function(){
      try{
        var saved=localStorage.getItem('niji_theme');
        var sys=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
        document.documentElement.dataset.theme=saved||sys;
      }catch(e){}
    })();
  </script>
  <style>
    :root{
      --accent1:#ff6b9d;--accent2:#c77dff;--accent3:#48cae4;
      --rainbow:linear-gradient(90deg,#ff6b6b,#ffa94d,#ffd43b,#69db7c,#4dabf7,#9775fa);
      --grad-pink:linear-gradient(135deg,#ff6b9d,#c77dff);
    }
    [data-theme="dark"]{
      --bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;
      --text:#e8e8f0;--text2:#9999bb;--text3:#666;
      --card-bg:#1e1e30;--card-border:#2e2e48;--card-hover:#222234;
      --selected-bg:#26182a;--shadow:rgba(0,0,0,.3);
      --skel:#1e1e30;--skel2:#2a2a40;
    }
    [data-theme="light"]{
      --bg:#fafafd;--bg2:#ffffff;--bg3:#f0f0f5;
      --text:#1a1a2e;--text2:#666688;--text3:#aaa;
      --card-bg:#ffffff;--card-border:#e0e0ea;--card-hover:#f5f5fa;
      --selected-bg:#fff0f7;--shadow:rgba(100,100,150,.12);
      --skel:#eee;--skel2:#ddd;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC','Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;-webkit-tap-highlight-color:transparent}
    .rainbow-bar{height:4px;background:var(--rainbow)}
    .header{background:var(--bg2);border-bottom:1px solid var(--card-border);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;backdrop-filter:blur(10px);padding-top:max(14px,env(safe-area-inset-top))}
    .header-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .header-title{font-size:18px;font-weight:700}
    .header-sub{font-size:11px;color:var(--text2);margin-top:1px}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .back-btn{background:var(--card-bg);border:1px solid var(--card-border);color:var(--text);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;transition:all .2s}
    .back-btn:hover{background:var(--card-border)}
    .page-pad{padding:18px;max-width:1400px;margin:0 auto}
    .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
    .search-box{background:var(--card-bg);border:1px solid var(--card-border);color:var(--text);padding:8px 14px;border-radius:20px;font-size:14px;width:200px;outline:none;transition:border-color .2s}
    .search-box:focus{border-color:var(--accent2)}
    .search-box::placeholder{color:var(--text2)}
    .filter-btn{background:var(--card-bg);border:1px solid var(--card-border);color:var(--text2);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;transition:all .2s;white-space:nowrap}
    .filter-btn.active{color:#fff;border-color:transparent}
    .filter-btn.active.all{background:var(--grad-pink)}
    .filter-btn.active.JP{background:linear-gradient(135deg,#ff6b6b,#ff8c42)}
    .filter-btn.active.EN{background:linear-gradient(135deg,#4dabf7,#2196F3)}
    .filter-btn.active.VR{background:linear-gradient(135deg,#69db7c,#43a047)}
    .filters{position:sticky;top:60px;z-index:100;background:var(--bg);padding:8px 0 8px;margin:0 0 14px}
    .filter-btn:not(.active):hover{border-color:var(--accent2);color:var(--text)}
    .member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
    @media(max-width:480px){.member-grid{grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:7px}}
    .member-card{background:var(--card-bg);border:2px solid var(--card-border);border-radius:14px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform .18s,border-color .18s,background .18s,box-shadow .18s;position:relative;text-align:center;user-select:none}
    .member-card:hover{border-color:var(--accent2);transform:translateY(-2px);background:var(--card-hover);box-shadow:0 8px 24px var(--shadow)}
    .member-card.selected{border-color:var(--accent1);background:var(--selected-bg);box-shadow:0 0 0 2px rgba(255,107,157,.25),0 8px 20px rgba(255,107,157,.18);animation:pop .25s ease-out}
    .member-card.selected .member-avatar,.member-card.selected .avatar-fallback{box-shadow:0 0 0 2px var(--accent1)}
    .member-card.inactive{opacity:.45}
    @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.05) translateY(-2px)}100%{transform:scale(1) translateY(0)}}
    .heart-badge{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;background:var(--accent1);display:flex;align-items:center;justify-content:center;font-size:12px;opacity:0;transform:scale(.7);transition:all .18s}
    .member-card.selected .heart-badge{opacity:1;transform:scale(1)}
    .member-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--card-border);background:var(--bg3);flex-shrink:0}
    .avatar-fallback{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;color:#fff;border:2px solid rgba(255,255,255,.15)}
    .member-name{font-size:11px;font-weight:600;line-height:1.3;max-width:100%;word-break:break-word}
    .member-name-en{font-size:10px;color:var(--text2);max-width:100%;word-break:break-word}
    .branch-tag{position:absolute;top:6px;right:6px;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px}
    .branch-JP{background:rgba(255,107,107,.3);color:#ff6b6b}
    .branch-EN{background:rgba(77,171,247,.3);color:#4dabf7}
    .branch-VR{background:rgba(105,219,124,.3);color:#69db7c}
    .oshi-fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border:none;padding:13px 28px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 32px rgba(199,125,255,.45);transition:all .2s;z-index:300;white-space:nowrap;animation:fabIn .3s ease}
    .oshi-fab:hover{transform:translateX(-50%) scale(1.04)}
    @keyframes fabIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .oshi-page{padding:20px;max-width:900px;margin:0 auto}
    .oshi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
    .oshi-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .2s;position:relative;text-align:center}
    .oshi-card:hover{border-color:var(--accent1);transform:translateY(-3px);box-shadow:0 10px 30px rgba(255,107,157,.2)}
    .oshi-card-name{font-size:13px;font-weight:600;line-height:1.3}
    .oshi-card-en{font-size:11px;color:var(--text2)}
    .oshi-merch-hint{font-size:11px;color:var(--accent3);margin-top:2px}
    .remove-btn{position:absolute;top:7px;right:7px;width:20px;height:20px;border-radius:50%;background:rgba(255,107,107,.2);border:none;color:#ff9999;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
    .remove-btn:hover{background:rgba(255,107,107,.5)}
    .member-hero{background:var(--bg2);border-bottom:1px solid var(--card-border);padding:20px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .hero-info{flex:1;min-width:0}
    .hero-name{font-size:20px;font-weight:700}
    .hero-name-en{font-size:13px;color:var(--text2);margin-top:2px}
    .hero-tags{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap}
    .hero-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--card-bg);border:1px solid var(--card-border)}
    .section-hdr{font-size:17px;font-weight:700;padding:16px 18px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .count-badge{font-size:12px;color:var(--text2);background:var(--card-bg);padding:3px 10px;border-radius:20px;border:1px solid var(--card-border)}
    .refresh-btn{font-size:12px;color:var(--text2);background:var(--card-bg);border:1px solid var(--card-border);padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .2s;margin-left:auto}
    .refresh-btn:hover{border-color:var(--accent2);color:var(--text)}
    .merch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:0 18px 80px}
    @media(max-width:480px){.merch-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px;padding:0 12px 60px}}
    .merch-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;overflow:hidden;text-decoration:none;color:var(--text);display:block;transition:all .2s}
    .merch-card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
    .merch-img{aspect-ratio:1;background:#111118;overflow:hidden}
    .merch-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
    .merch-card:hover .merch-img img{transform:scale(1.05)}
    .merch-info{padding:9px 11px 12px}
    .merch-title{font-size:11px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .merch-price{font-size:13px;font-weight:700;margin-top:5px;color:var(--accent1)}
    .merch-avail{font-size:10px;margin-top:3px;display:flex;align-items:center;gap:4px}
    .avail-dot{width:6px;height:6px;border-radius:50%}
    .avail-dot.in{background:#69db7c}
    .avail-dot.out{background:#ff6b6b}
    .merch-error{margin:0 18px 16px;padding:12px 16px;background:rgba(255,100,100,.1);border:1px solid rgba(255,100,100,.3);border-radius:10px;font-size:13px;color:#ff9999;line-height:1.6}
    .merch-notice{margin:0 18px 16px;padding:12px 16px;background:rgba(77,171,247,.08);border:1px solid rgba(77,171,247,.2);border-radius:10px;font-size:12px;color:var(--text2);line-height:1.6}
    .merch-loading{text-align:center;padding:50px 20px;color:var(--text2)}
    .no-merch{text-align:center;padding:40px 20px;color:var(--text2)}
    .no-merch .icon{font-size:44px;margin-bottom:10px}
    .spinner{width:32px;height:32px;border:3px solid var(--card-border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:3px}
    .result-info{font-size:12px;color:var(--text2);margin-bottom:10px}
    .page-title{font-size:22px;font-weight:700;margin-bottom:4px}
    .page-sub{color:var(--text2);font-size:13px;margin-bottom:16px}
    .toggle-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer}
    .toggle-sw{width:30px;height:17px;background:var(--card-border);border-radius:9px;position:relative;transition:background .2s;flex-shrink:0}
    .toggle-sw.on{background:var(--accent2)}
    .toggle-sw::after{content:'';position:absolute;top:3px;left:3px;width:11px;height:11px;background:#fff;border-radius:50%;transition:left .2s}
    .toggle-sw.on::after{left:16px}
    .store-links{display:flex;gap:8px;flex-wrap:wrap;padding:0 18px 16px}
    .store-link-btn{display:inline-flex;align-items:center;gap:6px;background:var(--card-bg);border:1px solid var(--card-border);color:var(--text);padding:8px 16px;border-radius:20px;font-size:12px;text-decoration:none;transition:all .2s}
    .store-link-btn:hover{border-color:var(--accent2);transform:translateY(-1px)}
    .store-link-btn.yt:hover{border-color:#ff0000;color:#ff4444}
    .store-link-btn.x:hover{border-color:#1da1f2;color:#1da1f2}
    .store-link-btn.tw:hover{border-color:#9146ff;color:#9146ff}
    .store-link-btn.shop:hover{border-color:var(--accent1);color:var(--accent1)}
    .fetch-status{font-size:10px;color:var(--text2);padding:0 18px 8px}
    .auth-btn{background:linear-gradient(135deg,var(--accent1),var(--accent2));border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;transition:transform .15s}
    .auth-btn:hover{transform:translateY(-1px)}
    .auth-pill{display:flex;align-items:center;gap:6px;background:var(--card-bg);border:1px solid var(--card-border);padding:4px 4px 4px 10px;border-radius:20px;font-size:11px;color:var(--text2)}
    .auth-pill .auth-email{color:var(--text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    @media(max-width:480px){
      .auth-pill .auth-email{max-width:60px;font-size:10px}
      .header-title{font-size:15px!important}
      .header-sub{display:none}
      .back-btn{padding:5px 10px;font-size:11px}
      .filters{top:54px}
    }
    .auth-pill .auth-logout{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:11px;padding:2px 8px;border-radius:12px}
    .auth-pill .auth-logout:hover{background:var(--card-border);color:var(--accent1)}
    .notify-row{display:flex;align-items:center;gap:8px;background:var(--card-bg);border:1px solid var(--card-border);padding:10px 14px;border-radius:12px;margin:0 0 14px;font-size:13px}
    .notify-row .nt-label{flex:1;color:var(--text)}
    .notify-row .nt-sub{font-size:11px;color:var(--text2);margin-top:2px}
    .modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);padding:20px}
    .modal{background:var(--bg2);border:1px solid var(--card-border);border-radius:16px;padding:24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .modal h2{font-size:18px;margin-bottom:6px}
    .modal p{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5}
    .modal input{width:100%;background:var(--bg);border:1px solid var(--card-border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:14px;outline:none;margin-bottom:12px;font-family:inherit}
    .modal input:focus{border-color:var(--accent2)}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end}
    .modal-actions button{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:inherit}
    .modal-cancel{background:var(--card-bg);color:var(--text2)}
    .modal-submit{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;font-weight:600}
    .modal-submit:disabled{opacity:.5;cursor:not-allowed}
    .modal-msg{font-size:12px;padding:8px 12px;border-radius:8px;margin-top:10px;line-height:1.5}
    .modal-msg.ok{background:rgba(105,219,124,.15);color:#69db7c}
    .modal-msg.err{background:rgba(255,107,107,.15);color:#ff6b6b}

    /* Theme toggle */
    .theme-btn{background:var(--card-bg);border:1px solid var(--card-border);color:var(--text);width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0}
    .theme-btn:hover{border-color:var(--accent2);transform:rotate(15deg)}

    /* Toast */
    .toast-wrap{position:fixed;left:50%;bottom:max(20px,env(safe-area-inset-bottom));transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
    .toast{background:var(--bg2);color:var(--text);border:1px solid var(--card-border);border-radius:24px;padding:10px 18px;font-size:13px;box-shadow:0 8px 28px var(--shadow);animation:toast-in .25s ease-out;max-width:90vw;display:flex;align-items:center;gap:8px}
    .toast.ok{border-left:3px solid #69db7c}
    .toast.err{border-left:3px solid #ff6b6b}
    .toast.info{border-left:3px solid var(--accent3)}
    @keyframes toast-in{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* Skeleton */
    @keyframes skel{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .skel{background:linear-gradient(90deg,var(--skel) 0%,var(--skel2) 50%,var(--skel) 100%);background-size:200% 100%;animation:skel 1.4s infinite;border-radius:8px}
    .skel-card{background:var(--card-bg);border:2px solid var(--card-border);border-radius:14px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:8px}
    .skel-avatar{width:64px;height:64px;border-radius:50%}
    .skel-line{height:11px;width:80%}
    .skel-line.short{width:50%}

    /* Notify cards (improved) */
    .notify-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:14px 16px;margin-bottom:10px;transition:border-color .2s,background .2s}
    .notify-card.active{border-color:var(--accent2);background:linear-gradient(135deg,var(--card-bg),var(--selected-bg))}
    .notify-card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:4px}
    .notify-card-icon{font-size:22px;flex-shrink:0}
    .notify-card-title{font-size:14px;font-weight:600;color:var(--text);flex:1}
    .notify-card-sub{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5}
    .notify-card-toggles{display:flex;gap:8px;flex-wrap:wrap}
    .notify-pill{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--card-border);padding:6px 12px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .2s;user-select:none}
    .notify-pill:hover{border-color:var(--accent2)}
    .notify-pill.on{background:var(--grad-pink);border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(255,107,157,.3)}
    .notify-pill .pill-emoji{font-size:13px}

    /* Onboarding banner */
    .onboarding{background:linear-gradient(135deg,rgba(255,107,157,.12),rgba(199,125,255,.12));border:1px solid rgba(199,125,255,.3);border-radius:14px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px;animation:fade-in .4s}
    .onboarding-icon{font-size:24px;flex-shrink:0}

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef}=React;

const SUPABASE_URL='https://fntotxazjfkzwejotxac.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_2mMxRnHZLrIJCOfWlniPfA_XHDh0LGi';
const VAPID_PUBLIC='BI11MhCMb8W1HkUMRdzvmPked1D20q35I5RR1b-KllDl-jvw3XtpJfLbWUDy5YGsVG-mdZkL3TgQqKfyTvH0ycg';

// VAPID base64url → Uint8Array
function urlBase64ToUint8Array(b64){
  const pad='='.repeat((4-b64.length%4)%4);
  const base64=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(base64);
  const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;++i) out[i]=raw.charCodeAt(i);
  return out;
}

async function ensurePushSubscription(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window))
    throw new Error('此瀏覽器不支援 Web Push（iPhone 請到主畫面安裝後再試）');
  const reg=await navigator.serviceWorker.ready;
  let sub=await reg.pushManager.getSubscription();
  if(!sub){
    const perm=await Notification.requestPermission();
    if(perm!=='granted') throw new Error('您拒絕了通知權限');
    sub=await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC),
    });
  }
  return sub;
}

async function unsubscribePush(){
  if(!('serviceWorker' in navigator)) return;
  const reg=await navigator.serviceWorker.ready;
  const sub=await reg.pushManager.getSubscription();
  if(sub) await sub.unsubscribe();
}

const STORE='https://shop.nijisanji.jp';
// 商品資料由 GitHub Actions 預先抓 shop.nijisanji.jp 全部商品 → data/products.json
// 前端只 fetch 這個靜態檔，沒有 CORS / proxy 問題，比對也精準（用真實 ライバー 名單）
let _productsCache=null;

async function loadProducts(){
  if(_productsCache) return _productsCache;
  const r=await fetch('./data/products.json');
  if(!r.ok) throw new Error(`products.json 載入失敗 (${r.status})`);
  const d=await r.json();
  _productsCache={products:d.products||[],lastUpdated:d.lastUpdated||''};
  return _productsCache;
}

// 社群連結（YouTube / X / Twitch），由 build_social.py 週週更新
let _socialCache=null;
async function loadSocial(){
  if(_socialCache) return _socialCache;
  try{
    const r=await fetch('./data/social.json',{cache:'no-cache'});
    if(!r.ok) return null;
    _socialCache=await r.json();
    return _socialCache;
  }catch{return null;}
}

// 直播資料（live + upcoming + past），存在 GitHub data branch，每 15 分鐘更新
// 不放在 main 避免污染 git log
const STREAMS_URL='https://raw.githubusercontent.com/lynn25004/nijisanji-oshi/data/streams.json';
let _streamsCache=null;
async function loadStreams(){
  if(_streamsCache) return _streamsCache;
  try{
    // 加 timestamp 規避 raw.githubusercontent CDN 5 分鐘快取
    const t=Math.floor(Date.now()/300000);
    const r=await fetch(`${STREAMS_URL}?t=${t}`,{cache:'no-cache'});
    if(!r.ok) return null;
    _streamsCache=await r.json();
    return _streamsCache;
  }catch{return null;}
}

// 過濾『假 live』：已結束 / 太久沒更新 / 已有 duration
function isActuallyLive(s){
  if(s.end_actual) return false;
  if(s.duration && s.duration>0) return false;
  if(s.start_actual){
    const t=new Date(s.start_actual).getTime();
    if(Date.now()-t>12*60*60*1000) return false;
  }
  return true;
}

// 比對成員 ↔ Holodex channel（跟後端 notify_streams.py 同邏輯）
function matchChannel(channel, member){
  if(!channel||!member) return false;
  const cname=(channel.name||'').toLowerCase();
  const cen=(channel.english_name||'').toLowerCase().trim();
  const n=(member.name||'').toLowerCase();
  const ne=(member.nameEn||'').toLowerCase().trim();
  if(n&&(cname.includes(n)||cen.includes(n))) return true;
  if(ne){
    const tokens=ne.split(/\s+/).filter(t=>t.length>=3);
    // 單字名（Kuzuha 等）：要求 english_name 完全相符
    if(tokens.length===1&&ne===cen) return true;
    if(tokens.length>=2&&tokens.every(t=>cen.includes(t)||cname.includes(t))) return true;
  }
  return false;
}

// 時間格式化
function fmtRelative(iso){
  if(!iso) return '';
  const t=new Date(iso).getTime();
  const now=Date.now();
  const diff=Math.round((t-now)/60000);  // 分鐘
  if(Math.abs(diff)<1) return '剛剛';
  if(diff>0){
    if(diff<60) return `${diff} 分鐘後`;
    if(diff<1440) return `${Math.round(diff/60)} 小時後`;
    return `${Math.round(diff/1440)} 天後`;
  }
  const ago=-diff;
  if(ago<60) return `${ago} 分鐘前`;
  if(ago<1440) return `${Math.round(ago/60)} 小時前`;
  return `${Math.round(ago/1440)} 天前`;
}
function fmtClock(iso){
  if(!iso) return '';
  const d=new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtDuration(sec){
  if(!sec) return '';
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60);
  return h>0?`${h}h${m}m`:`${m}m`;
}

function bl(b){return{JP:'🇯🇵 JP',EN:'🌍 EN',VR:'🌐 VR'}[b]||b}
function fd(d){if(!d)return'';const[y,m,day]=d.split('-');return`${y}年${+m}月${+day}日`}
function ini(n){if(!n)return'?';return/^[A-Za-z]/.test(n)?n.slice(0,2).toUpperCase():n.slice(0,1)}
function hc(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xFFFFFF;return'#'+('000000'+h.toString(16)).slice(-6)}
function lt(hex,a=.3){const n=parseInt(hex.slice(1),16);const r=Math.min(255,(n>>16)+Math.round(255*a));const g=Math.min(255,((n>>8)&0xFF)+Math.round(255*a));const b=Math.min(255,(n&0xFF)+Math.round(255*a));return`rgb(${r},${g},${b})`}

function Avatar({member,size=64}){
  const[fail,setFail]=useState(false);
  const c=member.color||hc(member.id||'x');
  if(!member.image||fail)
    return <div className="avatar-fallback" style={{width:size,height:size,background:`linear-gradient(135deg,${c},${lt(c)})`,fontSize:size*.28}}>{ini(member.name||member.nameEn)}</div>;
  return <img className="member-avatar" src={member.image} alt={member.nameEn||member.name} width={size} height={size} onError={()=>setFail(true)} style={{width:size,height:size}}/>;
}

function MerchCard({p}){
  return(
    <a className="merch-card" href={p.url} target="_blank" rel="noreferrer">
      <div className="merch-img">
        {p.image?<img src={p.image} alt={p.title} loading="lazy"/>

// Google Calendar URL：把直播加入行事曆
function gcalUrl(s, channelName){
  const start=new Date(s.start_scheduled||s.available_at);
  const end=new Date(start.getTime()+60*60*1000);  // 預設 1 小時
  const fmt=d=>d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const params=new URLSearchParams({
    action:'TEMPLATE',
    text:`🔴 ${channelName||''} ${s.title||''}`.trim(),
    dates:`${fmt(start)}/${fmt(end)}`,
    details:`https://www.youtube.com/watch?v=${s.id}\n\n${s.title||''}`,
    location:`https://www.youtube.com/watch?v=${s.id}`,
  });
  return `https://calendar.google.com/calendar/render?${params}`;
}

function StreamCard({s,kind,showChannel}){
  const url=`https://www.youtube.com/watch?v=${s.id}`;
  const thumb=`https://i.ytimg.com/vi/${s.id}/mqdefault.jpg`;
  const chName=s.channel?.name||s.channel?.english_name||'';
  let badge=null, when='';
  if(kind==='live'){
    badge=<span className="badge live">🔴 LIVE</span>;
    when=`${fmtRelative(s.start_actual||s.available_at)}開始 · ${(s.live_viewers||0).toLocaleString()} 觀看`;
  }else if(kind==='upcoming'){
    const diff=(new Date(s.start_scheduled).getTime()-Date.now())/60000;
    badge=diff<60?<span className="badge soon">即將</span>:<span className="badge">⏰ 排程</span>;
    when=`${fmtClock(s.start_scheduled)} · ${fmtRelative(s.start_scheduled)}`;
  }else{
    badge=<span className="badge">📼 已結束</span>;
    when=`${fmtClock(s.available_at)} · ${fmtDuration(s.duration)}${fmtRelative(s.available_at)?' · '+fmtRelative(s.available_at):''}`;
  }
  return(
    <div className={`stream-card ${kind==='live'?'live-card':''}`}>
      <a className="stream-card-main" href={url} target="_blank" rel="noreferrer">
        <img className="stream-thumb" src={thumb} alt="" loading="lazy"/>
        <div className="stream-info">
          <div className="stream-title">{s.title||'(無標題)'}</div>
          <div className="stream-meta">{badge}{when}</div>
          {showChannel&&chName&&<div className="stream-channel">{chName}</div>}
        </div>
      </a>
      {kind==='upcoming'&&(
        <a className="cal-btn" href={gcalUrl(s,chName)} target="_blank" rel="noreferrer" title="加入 Google Calendar">📅</a>
      )}
    </div>
  );
}

function StreamsForMember({member}){
  const[streams,setStreams]=useState(null);
  useEffect(()=>{loadStreams().then(setStreams);},[]);

  const filtered=useMemo(()=>{
    if(!streams) return null;
    const live=(streams.live||[]).filter(s=>matchChannel(s.channel,member)).filter(isActuallyLive);
    const upcoming=(streams.upcoming||[]).filter(s=>matchChannel(s.channel,member));
    const past=(streams.past||[]).filter(s=>matchChannel(s.channel,member)).slice(0,5);
    return {live,upcoming,past,lastUpdated:streams.lastUpdated};
  },[streams,member]);

  if(streams===null) return null;  // 還沒載完，靜默
  if(!filtered||(!filtered.live.length&&!filtered.upcoming.length&&!filtered.past.length)){
    return null;  // 完全沒資料就不顯示這區
  }

  return(
    <div style={{marginBottom:24}}>
      {filtered.live.length>0&&(
        <div className="stream-sec">
          <div className="stream-hdr live">
            <span className="live-dot"></span>直播中
            <span className="pill">{filtered.live.length}</span>
          </div>
          {filtered.live.map(s=><StreamCard key={s.id} s={s} kind="live"/>)}
        </div>
      )}
      {filtered.upcoming.length>0&&(
        <div className="stream-sec">
          <div className="stream-hdr">
            ⏰ 接下來
            <span className="pill">{filtered.upcoming.length}</span>
          </div>
          {filtered.upcoming.slice(0,3).map(s=><StreamCard key={s.id} s={s} kind="upcoming"/>)}
        </div>
      )}
      {filtered.past.length>0&&(
        <div className="stream-sec">
          <div className="stream-hdr">
            📼 最近直播
            <span className="pill">{filtered.past.length}</span>
          </div>
          {filtered.past.map(s=><StreamCard key={s.id} s={s} kind="past"/>)}
        </div>
      )}
    </div>
  );
}

function MerchPage({member}){
  const[data,setData]=useState(null);
  const[err,setErr]=useState('');
  const[social,setSocial]=useState(null);
  const[sortBy,setSortBy]=useState('official');  // official / newest / oldest / price-asc / price-desc
  const[unitFilter,setUnitFilter]=useState('');  // unit (categry) 篩選

  useEffect(()=>{
    setErr('');
    loadProducts().then(setData).catch(e=>setErr(e.message));
    loadSocial().then(s=>setSocial(s?.social?.[member.id]||null));
  },[member.id]);

  const matchedAll=useMemo(()=>{
    if(!data||!member.name) return[];
    return data.products.filter(p=>
      (p.talents||[]).includes(member.name) && p.available!==false
    );
  },[data,member]);

  // 收集這位成員所有出現過的 unit（按出現次數排），給篩選下拉
  const unitOptions=useMemo(()=>{
    const counts={};
    matchedAll.forEach(p=>(p.units||[]).forEach(u=>{counts[u]=(counts[u]||0)+1;}));
    // 過濾掉太通用的（出現在每樣商品的 unit）+ 出現次數太少的
    const total=matchedAll.length;
    return Object.entries(counts)
      .filter(([u,c])=>c<total*0.9 && c>=2)  // 不要那些幾乎每件都有 / 只 1 件
      .sort((a,b)=>b[1]-a[1])
      .slice(0,12)
      .map(([u,c])=>({u,c}));
  },[matchedAll]);

  const matched=useMemo(()=>{
    let l=matchedAll;
    if(unitFilter) l=l.filter(p=>(p.units||[]).includes(unitFilter));
    const BIG=1e9;
    const sorted=[...l];
    if(sortBy==='newest'){
      // 有官方排名的優先（避免老 voice 擠進前面），同組內按 firstSeenAt desc
      sorted.sort((a,b)=>{
        const aHas=Number.isFinite(a.officialOrder)?0:1;
        const bHas=Number.isFinite(b.officialOrder)?0:1;
        if(aHas!==bHas) return aHas-bHas;
        return (b.firstSeenAt||b.lastmod||'').localeCompare(a.firstSeenAt||a.lastmod||'');
      });
    }else if(sortBy==='oldest'){
      sorted.sort((a,b)=>{
        const aHas=Number.isFinite(a.officialOrder)?0:1;
        const bHas=Number.isFinite(b.officialOrder)?0:1;
        if(aHas!==bHas) return aHas-bHas;
        return (a.firstSeenAt||a.lastmod||'').localeCompare(b.firstSeenAt||b.lastmod||'');
      });
    }else if(sortBy==='price-asc'){
      sorted.sort((a,b)=>(a.price??1e9)-(b.price??1e9));
    }else if(sortBy==='price-desc'){
      sorted.sort((a,b)=>(b.price??-1)-(a.price??-1));
    }else{  // official 預設
      sorted.sort((a,b)=>{
        const ra=Number.isFinite(a.officialOrder)?a.officialOrder:BIG;
        const rb=Number.isFinite(b.officialOrder)?b.officialOrder:BIG;
        if(ra!==rb) return ra-rb;
        return (b.firstSeenAt||b.lastmod||'').localeCompare(a.firstSeenAt||a.lastmod||'');
      });
    }
    return sorted;
  },[matchedAll,sortBy,unitFilter]);

  const c=member.color||hc(member.id||'x');
  const searchQ=encodeURIComponent(member.name||member.nameEn||'');

  return(
    <div>
      <div className="member-hero">
        <div style={{width:80,height:80,borderRadius:'50%',padding:2,background:`linear-gradient(135deg,${c},${lt(c)})`,flexShrink:0}}>
          <div style={{width:76,height:76,borderRadius:'50%',overflow:'hidden'}}><Avatar member={member} size={76}/></div>
        </div>
        <div className="hero-info">
          <div className="hero-name">{member.name}</div>
          {member.nameEn&&member.nameEn!==member.name&&<div className="hero-name-en">{member.nameEn}</div>}
          <div className="hero-tags">
            <span className="hero-tag">{bl(member.branch)}</span>
            {member.debutDate&&<span className="hero-tag">📅 {fd(member.debutDate)}</span>}
            {member.active===false&&<span className="hero-tag" style={{color:'#ff9999'}}>已畢業</span>}
          </div>
        </div>
      </div>

      <div className="store-links">
        <a className="store-link-btn shop" href={`${STORE}/search?q=${searchQ}`} target="_blank" rel="noreferrer">🛒 商店搜尋</a>
        {(social?.youtube||member.channelUrl)&&
          <a className="store-link-btn yt" href={social?.youtube||member.channelUrl} target="_blank" rel="noreferrer"><span style={{color:'#ff0000',fontSize:14}}>▶</span> YouTube</a>}

function DeleteAccountBtn(){
  const toast=useToast();
  const handle=async()=>{
    if(!confirm('確定要刪除帳號嗎？\n\n這會清空：\n• 你的推し清單\n• 通知訂閱設定\n• 推播訂閱\n• 寄信紀錄\n\n刪除後無法復原。')) return;
    try{
      const{data:{session}}=await sb.auth.getSession();
      if(!session) return;
      const uid=session.user.id;
      // RLS 會自動 cascade 删除以下表的本人資料
      await Promise.all([
        sb.from('oshi_subscriptions').delete().eq('user_id',uid),
        sb.from('oshi_notify_settings').delete().eq('user_id',uid),
        sb.from('oshi_push_subscriptions').delete().eq('user_id',uid),
        sb.from('oshi_notify_log').delete().eq('user_id',uid),
        sb.from('oshi_stream_notify_log').delete().eq('user_id',uid),
      ]);
      // 取消瀏覽器推播
      await unsubscribePush();
      // 清本機
      try{localStorage.removeItem('niji_oshi');}catch{}
      await sb.auth.signOut();
      toast('帳號資料已清除','ok',4000);
      setTimeout(()=>location.reload(),1500);
    }catch(e){
      toast('刪除失敗：'+(e.message||e),'err',4000);
    }
  };
  return(
    <button onClick={handle} style={{background:'transparent',border:'1px solid #ff6b6b',color:'#ff6b6b',padding:'6px 14px',borderRadius:16,cursor:'pointer',fontSize:11}}>
      🗑️ 刪除我的帳號
    </button>
  );
}

// 首頁直播 widget：顯示「現在 LIVE」+「30 分內開播」
function LiveNowWidget({members,oshiIds}){
  const[streams,setStreams]=useState(null);
  useEffect(()=>{loadStreams().then(setStreams);},[]);

  const data=useMemo(()=>{
    if(!streams) return null;
    const oshiMembers=members.filter(m=>oshiIds.has(m.id));
    const filterByOshi=arr=>{
      if(!oshiMembers.length) return arr;
      return arr.filter(s=>oshiMembers.some(m=>matchChannel(s.channel,m)));
    };
    // 過濾『假 live』：已結束 / 太久沒更新
    const live=filterByOshi((streams.live||[]).filter(isActuallyLive));
    const now=Date.now();
    const upcoming=filterByOshi((streams.upcoming||[]).filter(s=>{
      const t=new Date(s.start_scheduled).getTime();
      return t-now<=30*60*1000 && t>now;
    }));
    return {live,upcoming,hasOshi:oshiMembers.length>0};
  },[streams,members,oshiIds]);

  if(!data||(!data.live.length&&!data.upcoming.length)) return null;
  return(
    <div style={{marginBottom:14}}>
      {data.live.length>0&&(
        <div className="stream-sec">
          <div className="stream-hdr live">
            <span className="live-dot"></span>{data.hasOshi?'你推し正在直播':'彩虹社現在直播中'}
            <span className="pill">{data.live.length}</span>
          </div>
          {data.live.slice(0,3).map(s=><StreamCard key={s.id} s={s} kind="live" showChannel/>)}
          {data.live.length>3&&<div style={{fontSize:11,color:'var(--text2)',textAlign:'center',marginTop:4}}>還有 {data.live.length-3} 場…</div>}
        </div>
      )}
      {data.upcoming.length>0&&(
        <div className="stream-sec">
          <div className="stream-hdr">⏰ 30 分內開播<span className="pill">{data.upcoming.length}</span></div>
          {data.upcoming.slice(0,2).map(s=><StreamCard key={s.id} s={s} kind="upcoming" showChannel/>)}
        </div>
      )}
    </div>
  );
}

function LoginModal({onClose}){
  const[email,setEmail]=useState('');
  const[sending,setSending]=useState(false);
  const[sent,setSent]=useState(false);
  const[err,setErr]=useState('');
  const[code,setCode]=useState('');
  const[verifying,setVerifying]=useState(false);
  const[showPrivacy,setShowPrivacy]=useState(false);
  const submit=async()=>{
    if(!email.trim()) return;
    setSending(true);setErr('');
    // 不設 emailRedirectTo → Supabase 改寄 6 位數驗證碼（解 iPhone PWA 跟 Safari 分開儲存的問題）
    // 桌面用戶若有 magic link 也能點，桌面 Safari ≠ PWA 的問題不存在
    const{error}=await sb.auth.signInWithOtp({
      email:email.trim(),
      options:{shouldCreateUser:true}
    });
    setSending(false);
    if(error) setErr('寄送失敗：'+error.message);
    else setSent(true);
  };
  const verifyCode=async()=>{
    if(!code.trim()) return;
    setVerifying(true);setErr('');
    const{error}=await sb.auth.verifyOtp({
      email:email.trim(),
      token:code.trim().replace(/\s/g,''),
      type:'email',
    });
    setVerifying(false);
    if(error) setErr('驗證失敗：'+error.message+'（碼可能過期或輸錯）');
    else onClose();  // 登入成功 onAuthStateChange 會處理
  };
  return(
    <div className="modal-bd" onClick={e=>{if(e.target===e.currentTarget) onClose();}}>
      <div className="modal">
        {!sent?(
          <>
            <h2>登入 / 註冊</h2>
            <p>輸入 email，我們會寄一封「免密碼」登入連結給你。第一次使用會自動註冊，跨裝置同步推し清單與通知設定。</p>
            <input type="email" placeholder="your@email.com" value={email}
              onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter') submit();}} autoFocus/>
            <div className="modal-actions">
              <button className="modal-cancel" onClick={onClose}>取消</button>
              <button className="modal-submit" onClick={submit} disabled={sending||!email.trim()}>
                {sending?'寄送中…':'寄登入連結'}
              </button>
            </div>
            {err&&<div className="modal-msg err">{err}</div>}
            <div style={{fontSize:11,color:'var(--text2)',marginTop:14,paddingTop:12,borderTop:'1px solid var(--card-border)',lineHeight:1.6}}>
              {showPrivacy?(
                <>
                  <b style={{color:'var(--text)'}}>📋 資料用途</b><br/>
                  • Email 只用於：登入、發送你訂閱的通知<br/>
                  • 推し清單只有你自己看得到（RLS 鎖死）<br/>
                  • 不會分享、不會做廣告、不會賣<br/>
                  • 隨時到「我的推し」頁底點「刪除帳號」即可清空所有資料<br/>
                  <a href="#" onClick={e=>{e.preventDefault();setShowPrivacy(false);}} style={{color:'var(--accent2)'}}>收起</a>
                </>
              ):(
                <>
                  登入即同意 <a href="#" onClick={e=>{e.preventDefault();setShowPrivacy(true);}} style={{color:'var(--accent2)'}}>資料用途說明</a>（30 秒讀完）
                </>
              )}
            </div>
          </>
        ):(
          <>
            <div style={{textAlign:'center',padding:'4px 0 14px'}}>
              <div style={{fontSize:48,marginBottom:8}}>📬</div>
              <h2 style={{marginBottom:6}}>驗證碼已寄出</h2>
              <p style={{textAlign:'center',marginBottom:14,fontSize:13}}>
                信箱：<b style={{color:'var(--text)'}}>{email}</b><br/>
                <span style={{color:'var(--text3)',fontSize:11}}>請輸入信件中的 6 位數驗證碼（5 分鐘內有效，沒收到請看垃圾信匣）</span>
              </p>
            </div>
            <input
              type="text" inputMode="numeric" pattern="[0-9]*"
              placeholder="6 位數驗證碼"
              value={code}
              onChange={e=>setCode(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter') verifyCode();}}
              autoFocus
              style={{textAlign:'center',fontSize:22,letterSpacing:6,fontFamily:'monospace'}}
            />
            <div className="modal-actions">
              <button className="modal-cancel" onClick={onClose}>取消</button>
              <button className="modal-submit" onClick={verifyCode} disabled={verifying||code.replace(/\s/g,'').length<6}>
                {verifying?'驗證中…':'登入'}
              </button>
            </div>
            {err&&<div className="modal-msg err">{err}</div>}
            <div style={{fontSize:11,color:'var(--text3)',marginTop:10,textAlign:'center'}}>
              <a href="#" onClick={e=>{e.preventDefault();setSent(false);setCode('');setErr('');}} style={{color:'var(--text2)'}}>重新寄送驗證碼</a>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── Toast 系統 ───
const ToastCtx = React.createContext(()=>{});
function ToastProvider({children}){
  const[items,setItems]=useState([]);
  const push=useCallback((text,type='info',ms=2600)=>{
    const id=Math.random().toString(36).slice(2);
    setItems(s=>[...s,{id,text,type}]);
    setTimeout(()=>setItems(s=>s.filter(t=>t.id!==id)),ms);
  },[]);
  return(
    <ToastCtx.Provider value={push}>
      {children}
      <div className="toast-wrap">
        {items.map(t=>(
          <div key={t.id} className={`toast ${t.type}`}>
            {t.type==='ok'&&<span>✅</span>}
            {t.type==='err'&&<span>⚠️</span>}
            {t.type==='info'&&<span>💡</span>}
            <span>{t.text}</span>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast=()=>React.useContext(ToastCtx);

function ThemeToggle(){
  const[theme,setTheme]=useState(()=>document.documentElement.dataset.theme||'dark');
  const flip=()=>{
    const next=theme==='dark'?'light':'dark';
    document.documentElement.dataset.theme=next;
    try{localStorage.setItem('niji_theme',next);}catch{}
    setTheme(next);
  };
  return <button className="theme-btn" onClick={flip} title={theme==='dark'?'切換淺色':'切換深色'}>{theme==='dark'?'☀️':'🌙'}</button>;
}

function Onboarding({onDismiss,loggedIn}){
  return(
    <div className="onboarding">
      <span className="onboarding-icon">🌈</span>
      <div className="onboarding-body">
        <div className="onboarding-title">歡迎來到推し選擇器！</div>
        <div>
          1️⃣ 點頭像選你推的彩虹社成員<br/>
          2️⃣ 進「💜 我的推し」看周邊商品<br/>
          3️⃣ {loggedIn?'開啟通知':'登入後開啟通知'}，新品 / 直播都會主動提醒
        </div>
      </div>
      <button className="onboarding-close" onClick={onDismiss} title="不再顯示">×</button>
    </div>
  );
}

// ─── 探索區：🔥 熱門 + 🆕 最近出道（一直可見、可摺疊） ───
function ExplorePicks({members,oshiIds,onToggle}){
  const[popular,setPopular]=useState(null);
  const[collapsed,setCollapsed]=useState(()=>{
    try{return localStorage.getItem('niji_explore_collapsed')==='1';}catch{return false;}
  });
  useEffect(()=>{
    sb.from('oshi_popular_v').select('member_id,cnt').limit(50).then(({data})=>{
      setPopular(data||[]);
    });
  },[]);

  const memberMap=useMemo(()=>{
    const m={}; members.forEach(x=>{m[x.id]=x;}); return m;
  },[members]);

  const hot=useMemo(()=>{
    if(!popular) return [];
    return popular
      .filter(p=>memberMap[p.member_id]&&memberMap[p.member_id].active!==false)
      .slice(0,10)
      .map(p=>memberMap[p.member_id]);
  },[popular,memberMap]);

  const recent=useMemo(()=>{
    return members
      .filter(m=>m.active!==false&&m.debutDate)
      .sort((a,b)=>(a.debutDate<b.debutDate?1:-1))
      .slice(0,10);
  },[members]);

  if(!hot.length && !recent.length) return null;
  const toggle=()=>{
    const next=!collapsed;
    setCollapsed(next);
    try{localStorage.setItem('niji_explore_collapsed',next?'1':'0');}catch{}
  };

  return(
    <div className="explore-card">
      <button className="explore-hdr" onClick={toggle}>
        <span>探索推し</span>
        <span style={{marginLeft:'auto',fontSize:11,color:'var(--text2)'}}>{collapsed?'展開 ▼':'收起 ▲'}</span>
      </button>
      {!collapsed&&(
        <div className="explore-body">
          {hot.length>0&&(
            <div className="explore-row">
              <div className="explore-label">🔥 大家都推</div>
              <div className="explore-pics">
                {hot.map(m=><QuickPick key={m.id} member={m} selected={oshiIds.has(m.id)} onClick={()=>onToggle(m.id)}/>)}
              </div>
            </div>
          )}
          {recent.length>0&&(
            <div className="explore-row">
              <div className="explore-label">🆕 最近出道</div>
              <div className="explore-pics">
                {recent.map(m=><QuickPick key={m.id} member={m} selected={oshiIds.has(m.id)} onClick={()=>onToggle(m.id)}/>)}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function QuickPick({member,selected,onClick}){
  return(
    <button onClick={onClick} title={member.name} style={{
      background:'transparent',border:'none',padding:0,cursor:'pointer',
      flexShrink:0,position:'relative',transition:'transform .15s',
      transform:selected?'scale(1.05)':'scale(1)',
    }}>
      <div style={{width:48,height:48,borderRadius:'50%',overflow:'hidden',border:`2px solid ${selected?'var(--accent1)':'var(--card-border)'}`,boxShadow:selected?'0 0 0 2px rgba(255,107,157,.25)':'none'}}>
        <Avatar member={member} size={44}/>
      </div>
      {selected&&<span style={{position:'absolute',top:-2,right:-2,background:'var(--accent1)',color:'#fff',width:16,height:16,borderRadius:'50%',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center'}}>♥</span>}
    </button>
  );
}

// ─── Skeleton loaders ───
function MemberSkeleton(){
  return(
    <div className="member-grid">
      {Array.from({length:18}).map((_,i)=>(
        <div key={i} className="skel-card">
          <div className="skel skel-avatar"></div>
          <div className="skel skel-line"></div>
          <div className="skel skel-line short"></div>
        </div>
      ))}
    </div>
  );
}

function App(){
  const toast=useToast();
  const[members,setMembers]=useState([]);
  const[lastUpdated,setLastUpdated]=useState('');
  const[loading,setLoading]=useState(true);
  const[curMember,setCurMember]=useState(null);
  const[session,setSession]=useState(null);
  const[showLogin,setShowLogin]=useState(false);
  const[notify,setNotify]=useState({
    productEmail:false, productPush:false,
    streamEmail:false, streamPush:false,
  });
  const[showOnboarding,setShowOnboarding]=useState(()=>{
    try{return !localStorage.getItem('niji_onboarding_dismissed');}catch{return true;}
  });
  const dismissOnboarding=useCallback(()=>{
    setShowOnboarding(false);
    try{localStorage.setItem('niji_onboarding_dismissed','1');}catch{}
  },[]);
  const syncedRef=useRef(false);
  // 解析分享連結 ?oshi=id1,id2,id3 / ?goto=oshi (從通知信來)
  const sharedIds=(()=>{
    try{
      const v=new URLSearchParams(location.search).get('oshi');
      return v?v.split(',').map(s=>s.trim()).filter(Boolean):null;
    }catch{return null;}
  })();
  const gotoView=(()=>{
    try{return new URLSearchParams(location.search).get('goto');}catch{return null;}
  })();
  const[isShared,setIsShared]=useState(()=>!!sharedIds);
  const[oshiIds,setOshiIds]=useState(()=>{
    if(sharedIds) return new Set(sharedIds);
    try{return new Set(JSON.parse(localStorage.getItem('niji_oshi')||'[]'));}
    catch{return new Set();}
  });
  // ?goto=oshi 從通知信來 → 直接到「我的推し」（即使沒推し也跳，方便關通知）
  // 否則：有推し → 我的推し；沒推し → 成員列表
  const[view,setView]=useState(()=>gotoView==='oshi'?'oshi':(oshiIds.size>0?'oshi':'select'));
  const applySharedToSelf=useCallback(()=>{
    setIsShared(false);
    history.replaceState(null,'',location.pathname);
  },[]);
  useEffect(()=>{
    if(isShared) return;  // 分享模式下不污染自己的 localStorage
    try{localStorage.setItem('niji_oshi',JSON.stringify([...oshiIds]));}catch{}
  },[oshiIds,isShared]);
  useEffect(()=>{
    fetch('./data/members.json').then(r=>r.json()).then(d=>{
      const s=[...(d.members||[])].sort((a,b)=>(!a.debutDate?1:!b.debutDate?-1:a.debutDate.localeCompare(b.debutDate)));
      setMembers(s);setLastUpdated(d.lastUpdated||'');
    }).catch(()=>setMembers([])).finally(()=>setLoading(false));
  },[]);

  // ─── Supabase auth + sync ───
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const{data:sub}=sb.auth.onAuthStateChange((_e,s)=>{
      setSession(s);
      if(!s){
        syncedRef.current=false;
        setNotify({productEmail:false,productPush:false,streamEmail:false,streamPush:false});
      }
    });
    return()=>sub.subscription.unsubscribe();
  },[]);

  // 登入後：拉 Supabase 訂閱清單 → merge 進本機（第一次同步：以本機 + 雲端聯集為準）
  useEffect(()=>{
    if(!session||isShared||syncedRef.current) return;
    syncedRef.current=true;
    (async()=>{
      const[{data:subs},{data:settings}]=await Promise.all([
        sb.from('oshi_subscriptions').select('member_id').eq('user_id',session.user.id),
        sb.from('oshi_notify_settings').select('email_enabled,product_push_enabled,stream_email_enabled,stream_push_enabled').eq('user_id',session.user.id).maybeSingle()
      ]);
      const remote=new Set((subs||[]).map(r=>r.member_id));
      const local=new Set(oshiIds);
      // 第一次登入：合併兩邊。之後本機就跟雲端一致了
      const merged=new Set([...local,...remote]);
      setOshiIds(merged);
      // 把本機有但雲端沒有的塞回雲端
      const toInsert=[...local].filter(id=>!remote.has(id));
      if(toInsert.length){
        await sb.from('oshi_subscriptions').insert(toInsert.map(member_id=>({user_id:session.user.id,member_id})));
      }
      setNotify({
        productEmail:!!settings?.email_enabled,
        productPush:!!settings?.product_push_enabled,
        streamEmail:!!settings?.stream_email_enabled,
        streamPush:!!settings?.stream_push_enabled,
      });
    })();
  },[session,isShared]);

  const toggleOshi=useCallback(id=>{
    setOshiIds(prev=>{
      const n=new Set(prev);
      const had=n.has(id);
      had?n.delete(id):n.add(id);
      // 同步到 Supabase（登入時）
      if(session&&!isShared){
        if(had) sb.from('oshi_subscriptions').delete().eq('user_id',session.user.id).eq('member_id',id).then(()=>{});
        else sb.from('oshi_subscriptions').insert({user_id:session.user.id,member_id:id}).then(()=>{});
      }
      return n;
    });
  },[session,isShared]);
  const removeOshi=useCallback(id=>{
    setOshiIds(prev=>{const n=new Set(prev);n.delete(id);return n;});
    if(session&&!isShared){
      sb.from('oshi_subscriptions').delete().eq('user_id',session.user.id).eq('member_id',id).then(()=>{});
    }
  },[session,isShared]);

  // 寫入單一設定欄位
  const writeSetting=useCallback(async(field,v)=>{
    if(!session) return;
    await sb.from('oshi_notify_settings').upsert({
      user_id:session.user.id,
      [field]:v,
      updated_at:new Date().toISOString()
    });
  },[session]);

  // Email 切換：直接寫
  const toggleEmail=useCallback(async(kind,v)=>{
    setNotify(n=>({...n,[kind+'Email']:v}));
    await writeSetting(kind==='product'?'email_enabled':'stream_email_enabled', v);
    toast(`${kind==='product'?'新品':'直播'} email 已${v?'開啟':'關閉'}`,'ok');
  },[writeSetting,toast]);

  // Push 切換：v=true 時要求權限 + 訂閱 + 存 endpoint；v=false 時取消訂閱
  const togglePush=useCallback(async(kind,v)=>{
    if(!session) return;
    try{
      if(v){
        const sub=await ensurePushSubscription();
        const j=sub.toJSON();
        await sb.from('oshi_push_subscriptions').upsert({
          user_id:session.user.id,
          endpoint:j.endpoint,
          p256dh:j.keys.p256dh,
          auth:j.keys.auth,
          user_agent:navigator.userAgent.slice(0,500),
        },{onConflict:'endpoint'});
      }
      setNotify(n=>({...n,[kind+'Push']:v}));
      await writeSetting(kind==='product'?'product_push_enabled':'stream_push_enabled', v);
      toast(`${kind==='product'?'新品':'直播'} 推播已${v?'開啟':'關閉'}`,'ok');
      // 兩個 push 都關了 → 取消瀏覽器訂閱
      const otherKey=kind==='product'?'streamPush':'productPush';
      if(!v && !notify[otherKey]){
        await unsubscribePush();
        await sb.from('oshi_push_subscriptions').delete().eq('user_id',session.user.id);
      }
    }catch(e){
      toast('開啟推播失敗：'+(e.message||e),'err',4000);
      setNotify(n=>({...n,[kind+'Push']:false}));
    }
  },[session,writeSetting,notify,toast]);

  const logout=useCallback(async()=>{
    await sb.auth.signOut();
    setNotify({productEmail:false,productPush:false,streamEmail:false,streamPush:false});
    toast('已登出','info');
  },[toast]);
  const titles={select:'彩虹社推し選擇器',oshi:'我的推し',merch:curMember?.name||'商品'};
  return(
    <div>
      <div className="header">
        <div className="header-logo">🌈</div>
        <div style={{minWidth:0,flex:1}}><div className="header-title" style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{titles[view]}</div><div className="header-sub">NIJISANJI Oshi Picker</div></div>
        <div className="header-right">
          {view==='merch'&&<button className="back-btn" onClick={()=>setView('oshi')}>← 返回</button>}
          {view==='oshi'&&<button className="back-btn" onClick={()=>setView('select')}>← 選擇成員</button>}
          <ThemeToggle/>
          <AuthBar session={session} onLogin={()=>setShowLogin(true)} onLogout={logout}/>
        </div>
      </div>
      {loading
        ? <div className="page-pad"><MemberSkeleton/></div>
        : <>
          {view==='select'&&<MemberSelect members={members} lastUpdated={lastUpdated} oshiIds={oshiIds} onToggle={toggleOshi} onViewOshi={()=>setView('oshi')} showOnboarding={showOnboarding&&!isShared} onDismissOnboarding={dismissOnboarding} loggedIn={!!session}/>}
          {view==='oshi'&&<OshiPage members={members} oshiIds={oshiIds} onRemove={removeOshi} onViewMerch={m=>{setCurMember(m);setView('merch');}} onBack={()=>setView('select')} isShared={isShared} onApplyShared={applySharedToSelf} notify={notify} onToggleEmail={toggleEmail} onTogglePush={togglePush} loggedIn={!!session} onLoginClick={()=>setShowLogin(true)}/>}
          {view==='merch'&&curMember&&<MerchPage member={curMember}/>}
        </>
      }
      {showLogin&&<LoginModal onClose={()=>setShowLogin(false)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><App/></ToastProvider>
);
</script>
</body>
</html>
