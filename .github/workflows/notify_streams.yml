name: 每小時檢查直播並通知訂閱者

on:
  schedule:
    - cron: "10 * * * *"
  workflow_dispatch:

concurrency:
  group: notify-streams
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安裝 pywebpush
        run: pip install pywebpush==2.0.3
      - name: 跑直播通知腳本
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          HOLODEX_API_KEY: ${{ secrets.HOLODEX_API_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_SUBJECT: mailto:a0423354860@gmail.com
          SITE_URL: https://lynn25004.github.io/nijisanji-oshi/
        run: python -u scripts/notify_streams.py
